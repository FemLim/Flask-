{% extends "base.html" %}

{% block title %}Список пользователей{% endblock %}

{% block content %}
<h1>Пользователи</h1>

<table class="table table-striped table-hover">
	<thead>
		<tr>
			<th>ID</th>
			<th>Имя</th>
			<th>Дата регистрации</th>
		</tr>
	</thead>
	<tbody>
		{% for user in users %}
		<tr>
			<td>{{ user.id }}</td>
			<td>{{ user.name }}</td>
			<td>{{ user.date_added.strftime('%d-%m-%Y %H:%M')}}</td>
			<td><form action="{{ url_for('delete_user', id=user.id) }}" method="POST" style="display:inline;">
				<button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Точно удалить?')">Удалить</button></td>
		</tr>
		{% endfor %}
	</tbody>
</table>
{% endblock %}
